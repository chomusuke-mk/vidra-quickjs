services:
  quickjs-builder:
    image: javiermk/vidra-quickjs:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GH_TOKEN=${GH_TOKEN:-}
    volumes:
      - ./dist:/app/dist
      - ./quickjs-src:/app/quickjs # Caché del código fuente en C
      - ./config.sh:/app/config.sh:ro
      - ./compile.sh:/app/compile.sh:ro
    working_dir: /app
    entrypoint: ["/app/compile.sh"]